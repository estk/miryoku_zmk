# Debounce: suppress key chatter (single press registering multiple inputs).
# Chatter here occurs on release (keys repeat when lifting off), so the
# release window is widened more than press to absorb release-edge bounce.
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=8
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=12
